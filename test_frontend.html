<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>前端測試</title>
</head>
<body>
    <h1>卡牌系統前端測試</h1>
    
    <div id="output"></div>
    
    <script>
        const outputDiv = document.getElementById('output');
        outputDiv.innerHTML = '<p>開始測試...</p>';
        
        // 測試 API 連接
        fetch('/api/search?keyword=卡牌')
            .then(response => {
                outputDiv.innerHTML += `<p>✓ API 連接成功，狀態碼: ${response.status}</p>`;
                return response.json();
            })
            .then(data => {
                outputDiv.innerHTML += `<p>✓ JSON 解析成功</p>`;
                outputDiv.innerHTML += `<p>關鍵字: ${data.keyword}</p>`;
                outputDiv.innerHTML += `<p>總商品數: ${data.total_results}</p>`;
                outputDiv.innerHTML += `<p>蝦皮: ${data.results.shopee.length}</p>`;
                outputDiv.innerHTML += `<p>露天: ${data.results.ruten.length}</p>`;
                outputDiv.innerHTML += `<p>Yahoo: ${data.results.yahoo.length}</p>`;
                outputDiv.innerHTML += `<p>PChome: ${data.results.pchome.length}</p>`;
                
                // 顯示第一個商品
                const firstProduct = data.results.shopee[0];
                outputDiv.innerHTML += `<h2>第一個商品：</h2>`;
                outputDiv.innerHTML += `<p>名稱: ${firstProduct.name}</p>`;
                outputDiv.innerHTML += `<p>價格: ${firstProduct.price}</p>`;
                outputDiv.innerHTML += `<p>圖片: ${firstProduct.image}</p>`;
                outputDiv.innerHTML += `<p>店家: ${firstProduct.shop}</p>`;
                outputDiv.innerHTML += `<p>評級: ${firstProduct.rating}</p>`;
            })
            .catch(error => {
                outputDiv.innerHTML += `<p style="color: red;">❌ 錯誤: ${error.message}</p>`;
            });
    </script>
</body>
</html>
