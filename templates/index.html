<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡牌價格查詢系統 - 一站式卡牌搜尋平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #8b5cf6;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --border-color: #334155;
            --text-primary: #e2e8f0;
            --text-secondary: #cbd5e1;
        }

        * {
            color-scheme: dark;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        /* 導航欄 */
        .navbar {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(139, 92, 246, 0.1) 100%);
            border-bottom: 2px solid var(--border-color);
            padding: 1rem 0;
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 主容器 */
        .container-main {
            padding: 3rem 1rem;
            min-height: 100vh;
        }

        /* 搜索區域 */
        .search-section {
            margin-bottom: 3rem;
            text-align: center;
        }

        .search-section h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-section p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .search-input-group {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            gap: 0.5rem;
        }

        .search-input-group input {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: all 0.3s ease;
            flex: 1;
        }

        .search-input-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .search-input-group button {
            background-color: var(--primary-color);
            border: 2px solid var(--primary-color);
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .search-input-group button:hover {
            background-color: var(--secondary-color);
            border-color: var(--secondary-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .search-input-group button:active {
            transform: translateY(0);
        }

        /* 平台標籤 */
        .platform-tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .platform-btn {
            padding: 0.5rem 1.5rem;
            border: 2px solid var(--border-color);
            background-color: transparent;
            color: var(--text-secondary);
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .platform-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .platform-btn.active {
            border-color: var(--primary-color);
            background-color: var(--primary-color);
            color: white;
        }

        /* 結果區域 */
        .results-section {
            display: none;
        }

        .results-section.active {
            display: block;
        }

        .platform-results {
            margin-bottom: 3rem;
        }

        .platform-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
        }

        .platform-icon {
            font-size: 2rem;
        }

        .platform-header h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .result-count {
            margin-left: auto;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* 商品卡片 */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .product-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            border-color: var(--primary-color);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.2);
        }

        .product-image {
            width: 100%;
            height: 220px;
            background-color: rgba(99, 102, 241, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 1.25rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-shop {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
        }

        .rating {
            font-size: 0.85rem;
            color: var(--warning-color);
            margin-bottom: 0.75rem;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--success-color);
            margin-bottom: 1rem;
        }

        .product-footer {
            display: flex;
            gap: 0.5rem;
            margin-top: auto;
        }

        .btn-visit {
            flex: 1;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            text-align: center;
        }

        .btn-visit:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
        }

        /* 載入狀態 */
        .loading {
            text-align: center;
            padding: 3rem 1rem;
        }

        .spinner-border {
            color: var(--primary-color);
            width: 3rem;
            height: 3rem;
            margin-bottom: 1rem;
        }

        /* 空結果 */
        .no-results {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }

        .no-results i {
            font-size: 3rem;
            color: var(--warning-color);
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* 響應式設計 */
        @media (max-width: 768px) {
            .search-section h1 {
                font-size: 2rem;
            }

            .search-input-group {
                flex-direction: column;
            }

            .product-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 1rem;
            }

            .platform-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .result-count {
                margin-left: 0;
            }
        }

        /* 平台顏色 */
        .platform-shopee {
            --platform-color: #ee7752;
        }

        .platform-ruten {
            --platform-color: #d32f2f;
        }

        .platform-yahoo {
            --platform-color: #ffd700;
        }

        .platform-pchome {
            --platform-color: #00b4d8;
        }

        .platform-header {
            --platform-color: var(--primary-color);
        }

        .platform-header.platform-shopee {
            border-bottom-color: #ee7752;
        }

        .platform-header.platform-ruten {
            border-bottom-color: #d32f2f;
        }

        .platform-header.platform-yahoo {
            border-bottom-color: #ffd700;
        }

        .platform-header.platform-pchome {
            border-bottom-color: #00b4d8;
        }

        /* 動畫 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .product-card {
            animation: fadeIn 0.3s ease-out;
        }

        .platform-results {
            animation: fadeIn 0.4s ease-out;
        }
    </style>
</head>
<body>
    <!-- 導航欄 -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-credit-card"></i> 卡牌價格查詢系統
            </a>
            <span class="navbar-text ms-auto">
                <small>一站式卡牌搜尋平台</small>
            </span>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="container-main">
        <!-- 搜索區域 -->
        <div class="search-section">
            <h1>🎴 卡牌價格比較</h1>
            <p>在所有主要平台上搜尋卡牌價格，快速找到最佳交易</p>
            
            <div class="search-input-group">
                <input 
                    type="text" 
                    id="searchKeyword" 
                    placeholder="輸入卡牌名稱 (例：青眼白龍、皮卡丘)..." 
                    onkeyup="handleKeyboardSearch(event)"
                >
                <button onclick="performSearch()" id="searchBtn">
                    <i class="fas fa-search"></i> 搜尋
                </button>
            </div>

            <!-- 平台篩選 -->
            <div class="platform-tabs">
                <button class="platform-btn active" onclick="setSearchMode('ecommerce')">
                    <i class="fas fa-shopping-cart"></i> 台灣平台
                </button>
                <button class="platform-btn" onclick="setSearchMode('international')">
                    <i class="fas fa-globe"></i> 國際卡牌 API
                </button>
                <button class="platform-btn" onclick="setSearchMode('combined')">
                    <i class="fas fa-plus"></i> 組合搜索
                </button>
            </div>
            
            <!-- 商品平台篩選 (台灣平台模式) -->
            <div id="ecommerceTabs" class="platform-tabs" style="display: none; margin-top: 1rem;">
                <button class="platform-btn active" onclick="filterByPlatform('all')">
                    <i class="fas fa-th"></i> 全部平台
                </button>
                <button class="platform-btn" onclick="filterByPlatform('pchome')">
                    <i class="fas fa-shopping-cart"></i> PChome
                </button>
                <button class="platform-btn" onclick="filterByPlatform('shopee')">
                    <i class="fas fa-shrimp"></i> 蝦皮
                </button>
                <button class="platform-btn" onclick="filterByPlatform('ruten')">
                    <i class="fas fa-store"></i> 露天
                </button>
                <button class="platform-btn" onclick="filterByPlatform('yahoo')">
                    <i class="fas fa-gavel"></i> Yahoo
                </button>
            </div>
        </div>

        <!-- 結果區域 -->
        <div class="results-section" id="resultsSection">
            <!-- 載入中 -->
            <div class="loading" id="loadingSection" style="display: none;">
                <div class="spinner-border" role="status"></div>
                <p>正在搜尋多個平台...</p>
            </div>

            <!-- 搜索結果 -->
            <div id="searchResults"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentSearchResults = {};
        let currentFilter = 'all';
        let searchMode = 'ecommerce';  // 新增：搜尋模式

        /**
         * 設定搜尋模式
         */
        function setSearchMode(mode) {
            searchMode = mode;
            console.log('搜尋模式已改為:', mode);
            
            // 更新按鈕狀態
            document.querySelectorAll('.platform-tabs').forEach((tabs, idx) => {
                if (idx === 0) {
                    // 第一個 tab 組是搜尋模式選擇器
                    Array.from(tabs.querySelectorAll('.platform-btn')).forEach((btn, i) => {
                        const modes = ['ecommerce', 'international', 'combined'];
                        if (modes[i] === mode) {
                            btn.classList.add('active');
                        } else {
                            btn.classList.remove('active');
                        }
                    });
                }
            });
            
            // 顯示/隱藏商品平台篩選器
            const ecommerceTabs = document.getElementById('ecommerceTabs');
            if (mode === 'ecommerce' || mode === 'combined') {
                ecommerceTabs.style.display = 'flex';
            } else {
                ecommerceTabs.style.display = 'none';
            }
            
            // 清空結果
            document.getElementById('searchResults').innerHTML = '';
            document.getElementById('resultsSection').classList.remove('active');
            currentFilter = 'all';
        }

        /**
         * 執行搜尋
         */
        async function performSearch() {
            const keyword = document.getElementById('searchKeyword').value.trim();
            console.log('開始搜尋:', keyword, '模式:', searchMode);
            
            if (!keyword || keyword.length < 2) {
                alert('請輸入至少 2 個字符');
                return;
            }

            showLoading(true);
            
            try {
                let url;
                if (searchMode === 'international') {
                    // 搜尋國際卡牌 API
                    url = `/api/card-references?keyword=${encodeURIComponent(keyword)}`;
                } else if (searchMode === 'combined') {
                    // 組合搜索
                    url = `/api/combined-search?keyword=${encodeURIComponent(keyword)}`;
                } else {
                    // 台灣平台搜尋
                    url = `/api/search?keyword=${encodeURIComponent(keyword)}`;
                }
                
                console.log('API 請求:', url);
                const response = await fetch(url);
                const data = await response.json();

                if (!response.ok) {
                    alert(data.error || '搜尋失敗，請稍後重試');
                    showLoading(false);
                    return;
                }

                console.log('搜尋結果:', data);
                
                if (searchMode === 'international') {
                    // 顯示國際卡牌結果
                    displayInternationalResults(data);
                } else if (searchMode === 'combined') {
                    // 顯示組合結果
                    displayCombinedResults(data);
                } else {
                    // 顯示台灣平台結果
                    currentSearchResults = data.results;
                    currentFilter = 'all';
                    updatePlatformButtons();
                    displayResults(data.results);
                }
                
                document.getElementById('resultsSection').classList.add('active');
            } catch (error) {
                console.error('搜尋錯誤:', error);
                alert('搜尋失敗，請檢查網路連線\n錯誤: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        /**
         * 顯示國際卡牌 API 結果
         */
        function displayInternationalResults(data) {
            const resultsContainer = document.getElementById('searchResults');
            resultsContainer.innerHTML = '';

            const cardConfig = {
                'yugioh': {
                    name: '🎴 遊戲王 (YGOProDeck)',
                    icon: '🎴',
                    color: '#FFD700'
                },
                'pokemon': {
                    name: '⚡ 寶可夢 (PokeAPI)',
                    icon: '⚡',
                    color: '#FF6B6B'
                },
                'mtg': {
                    name: '🪄 魔法風雲會 (Scryfall)',
                    icon: '🪄',
                    color: '#9932CC'
                }
            };

            // 過濾有結果的卡牌源
            const references = data.references || {};
            const hasResults = Object.values(references).some(arr => arr && arr.length > 0);

            if (!hasResults) {
                resultsContainer.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search"></i>
                        <h3>未找到符合的卡牌</h3>
                        <p>請嘗試其他搜尋關鍵字</p>
                    </div>
                `;
                return;
            }

            // 顯示各來源結果
            for (const [source, cards] of Object.entries(references)) {
                if (!cards || cards.length === 0) continue;

                const config = cardConfig[source];
                const cardsHtml = cards.map(card => createCardReferenceCard(card, source)).join('');

                const platformHtml = `
                    <div class="platform-results">
                        <div class="platform-header" style="border-bottom-color: ${config.color};">
                            <span class="platform-icon">${config.icon}</span>
                            <h2>${config.name}</h2>
                            <span class="result-count">${cards.length} 張卡牌</span>
                        </div>
                        <div class="product-grid">
                            ${cardsHtml}
                        </div>
                    </div>
                `;
                
                resultsContainer.innerHTML += platformHtml;
            }
        }

        /**
         * 創建卡牌參考卡片 HTML
         */
        function createCardReferenceCard(card, source) {
            let cardDetails = '';
            
            if (source === 'yugioh') {
                cardDetails = `
                    <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem;">
                        <div><strong>類型:</strong> ${card.type || 'unknown'}</div>
                        <div><strong>ATK/DEF:</strong> ${card.atk || 0}/${card.def || 0}</div>
                        ${card.attribute ? `<div><strong>屬性:</strong> ${card.attribute}</div>` : ''}
                    </div>
                `;
            } else if (source === 'pokemon') {
                cardDetails = `
                    <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem;">
                        <div><strong>棲息地:</strong> ${card.habitat || 'unknown'}</div>
                        <div><strong>顏色:</strong> ${card.color || 'unknown'}</div>
                    </div>
                `;
            } else if (source === 'mtg') {
                cardDetails = `
                    <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem;">
                        <div><strong>類型:</strong> ${card.type || 'unknown'}</div>
                        ${card.mana_cost ? `<div><strong>魔力值:</strong> ${card.mana_cost}</div>` : ''}
                        ${card.power ? `<div><strong>力量/防禦:</strong> ${card.power}/${card.toughness}</div>` : ''}
                    </div>
                `;
            }

            return `
                <div class="product-card">
                    <div class="product-image">
                        <img src="${card.img_url}" alt="${card.title}" loading="lazy" onerror="this.src='https://picsum.photos/280/220?random=${Math.floor(Math.random()*1000)}';" style="width:100%; height:100%; object-fit:cover;">
                    </div>
                    <div class="product-info">
                        <div class="product-name">${card.title || 'Unknown'}</div>
                        ${cardDetails}
                        ${card.desc ? `<div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem; line-height: 1.3; height: 2.4em; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">${card.desc}</div>` : ''}
                        <div style="color: var(--primary-color); font-size: 0.85rem; margin-top: auto; padding-top: 0.5rem;">
                            來源: ${source.toUpperCase()}
                        </div>
                    </div>
                </div>
            `;
        }

        /**
         * 顯示組合搜索結果
         */
        function displayCombinedResults(data) {
            const resultsContainer = document.getElementById('searchResults');
            resultsContainer.innerHTML = '';

            let html = '';

            // 顯示台灣平台價格
            const taipeiPrices = data.taipei_prices || {};
            if (Object.keys(taipeiPrices).length > 0) {
                const pchomeItems = taipeiPrices.pchome || [];
                if (pchomeItems.length > 0) {
                    html += `
                        <div class="platform-results">
                            <div class="platform-header platform-pchome">
                                <span class="platform-icon">🇹🇼</span>
                                <h2>台灣價格 (PChome)</h2>
                                <span class="result-count">${pchomeItems.length} 個商品</span>
                            </div>
                            <div class="product-grid">
                                ${pchomeItems.map(item => createProductCard(item)).join('')}
                            </div>
                        </div>
                    `;
                }
            }

            // 顯示國際卡牌資料
            const references = data.international_references || {};
            const cardConfig = {
                'yugioh': { name: '🎴 遊戲王', icon: '🎴', color: '#FFD700' },
                'pokemon': { name: '⚡ 寶可夢', icon: '⚡', color: '#FF6B6B' },
                'mtg': { name: '🪄 魔法風雲會', icon: '🪄', color: '#9932CC' }
            };

            for (const [source, cards] of Object.entries(references)) {
                if (!cards || cards.length === 0) continue;
                
                const config = cardConfig[source];
                html += `
                    <div class="platform-results">
                        <div class="platform-header" style="border-bottom-color: ${config.color};">
                            <span class="platform-icon">${config.icon}</span>
                            <h2>${config.name}</h2>
                            <span class="result-count">${cards.length} 張參考卡</span>
                        </div>
                        <div class="product-grid">
                            ${cards.map(card => createCardReferenceCard(card, source)).join('')}
                        </div>
                    </div>
                `;
            }

            resultsContainer.innerHTML = html || `
                <div class="no-results">
                    <i class="fas fa-search"></i>
                    <h3>未找到符合的結果</h3>
                </div>
            `;
        }

        /**
         * 顯示/隱藏載入狀態
         */
        function showLoading(show) {
            document.getElementById('loadingSection') = document.getElementById('loadingSection') || createLoadingElement();
            const loadingElement = document.getElementById('loadingSection');
            if (!loadingElement) {
                const section = document.getElementById('resultsSection');
                const div = document.createElement('div');
                div.id = 'loadingSection';
                div.className = 'loading';
                div.innerHTML = '<div class="spinner-border" role="status"></div><p>正在搜尋...</p>';
                section.appendChild(div);
            }
            document.getElementById('loadingSection').style.display = show ? 'block' : 'none';
        }

        function createLoadingElement() {
            const section = document.getElementById('resultsSection');
            const div = document.createElement('div');
            div.id = 'loadingSection';
            div.className = 'loading';
            div.innerHTML = '<div class="spinner-border" role="status"></div><p>正在搜尋...</p>';
            section.appendChild(div);
            return div;
        }

        /**
         * 鍵盤搜尋
         */
        function handleKeyboardSearch(event) {
            if (event.key === 'Enter') {
                performSearch();
            }
        }

        /**
         * 顯示搜尋結果 (台灣平台)
            const resultsContainer = document.getElementById('searchResults');
            resultsContainer.innerHTML = '';

            const platformConfig = {
                'shopee': {
                    name: '🦐 蝦皮 Shopee',
                    icon: '🦐',
                    color: '#ee7752'
                },
                'ruten': {
                    name: '🏪 露天拍賣',
                    icon: '🏪',
                    color: '#d32f2f'
                },
                'yahoo': {
                    name: '🔨 Yahoo 奇摩',
                    icon: '🔨',
                    color: '#ffd700'
                },
                'pchome': {
                    name: '🛒 PChome 24h',
                    icon: '🛒',
                    color: '#00b4d8'
                }
            };

            // 過濾結果
            const filteredResults = {};
            for (const [platform, items] of Object.entries(results)) {
                if (currentFilter === 'all' || currentFilter === platform) {
                    if (items.length > 0) {
                        filteredResults[platform] = items;
                    }
                }
            }

            // 如果沒有結果
            if (Object.keys(filteredResults).length === 0) {
                resultsContainer.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search"></i>
                        <h3>未找到符合的商品</h3>
                        <p>請嘗試其他搜尋關鍵字</p>
                    </div>
                `;
                return;
            }

            // 顯示各平台結果
            for (const [platform, items] of Object.entries(filteredResults)) {
                const config = platformConfig[platform];
                
                const platformHtml = `
                    <div class="platform-results">
                        <div class="platform-header platform-${platform}">
                            <span class="platform-icon">${config.icon}</span>
                            <h2>${config.name}</h2>
                            <span class="result-count">${items.length} 個商品</span>
                        </div>

                        <div class="product-grid">
                            ${items.map(item => createProductCard(item)).join('')}
                        </div>
                    </div>
                `;
                
                resultsContainer.innerHTML += platformHtml;
            }
        }

        /**
         * 創建商品卡片 HTML
         */
        function createProductCard(item) {
            const hasImage = item.image && item.image !== '';
            
            // 改進圖片加載，支持跨域和備用方案
            let imageHtml = '';
            if (hasImage) {
                const fallbackImg = `https://picsum.photos/280/220?random=${Math.floor(Math.random()*1000)}`;
                imageHtml = `<img src="${item.image}" alt="${(item.name || 'Product').replace(/"/g, '')}" loading="lazy" onerror="this.src='${fallbackImg}'; this.style.opacity='0.7';" crossorigin="anonymous" style="width:100%; height:100%; object-fit:cover;">`;
            } else {
                imageHtml = `<div style="display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.1)); color: var(--text-secondary);"><i class="fas fa-image" style="font-size: 3rem; opacity: 0.3;"></i></div>`;
            }

            const ratingHtml = item.rating && item.rating > 0 
                ? `<div class="rating">⭐ ${parseFloat(item.rating).toFixed(1)} (${item.rating > 4 ? '推薦' : '普通'})</div>`
                : '';

            return `
                <div class="product-card" data-product-id="${(item.product_id || '').replace(/"/g, '&quot;')}" data-product-name="${(item.name || '').replace(/"/g, '&quot;')}" data-product-price="${item.price || 0}" data-product-image="${(item.image || '').replace(/"/g, '&quot;')}" data-product-shop="${(item.shop || '').replace(/"/g, '&quot;')}" data-product-rating="${item.rating || 0}">
                    <div class="product-image">
                        ${imageHtml}
                    </div>
                    <div class="product-info">
                        <div class="product-name">${(item.name || '未知商品').substring(0, 50)}</div>
                        ${item.shop ? `<div class="product-shop"><i class="fas fa-store"></i> ${(item.shop || '').substring(0, 30)}</div>` : ''}
                        ${ratingHtml}
                        <div class="product-price">NT$ ${formatPrice(item.price)}</div>
                        <div class="product-footer">
                            <button class="btn-detail" style="background-color: var(--secondary-color); margin-right: 0.5rem; flex: 1; padding: 0.75rem; border: none; border-radius: 0.5rem; color: white; cursor: pointer; font-weight: 600;">
                                <i class="fas fa-eye"></i> 詳情
                            </button>
                            <a href="${(item.url || 'javascript:void(0)').replace(/"/g, '&quot;')}" target="_blank" class="btn-visit" style="flex: 1; padding: 0.75rem; background-color: var(--primary-color); color: white; border: none; border-radius: 0.5rem; cursor: pointer; font-weight: 600; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                                <i class="fas fa-external-link-alt"></i> 購買
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }

        /**
         * 格式化價格
         */
        function formatPrice(price) {
            return parseFloat(price).toLocaleString('zh-TW', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            });
        }

        /**
         * 按平台篩選結果
         */
        function filterByPlatform(platform) {
            currentFilter = platform;
            updatePlatformButtons();
            
            const results = {};
            for (const [p, items] of Object.entries(currentSearchResults)) {
                if (platform === 'all' || platform === p) {
                    results[p] = items;
                }
            }
            
            displayResults(results);
        }

        /**
         * 更新平台按鈕狀態
         */
        function updatePlatformButtons() {
            document.querySelectorAll('.platform-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            const activeBtn = Array.from(document.querySelectorAll('.platform-btn')).find(btn => {
                if (currentFilter === 'all') {
                    return btn.textContent.includes('全部');
                }
                return btn.onclick.toString().includes(currentFilter);
            });
            
            if (activeBtn) {
                activeBtn.classList.add('active');
            }
        }

        /**
         * 頁面載入時自動聚焦搜尋框
         */
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化搜尋模式
            setSearchMode('ecommerce');
            
            document.getElementById('searchKeyword').focus();
            
            // 檢查 URL 參數
            const params = new URLSearchParams(window.location.search);
            const keyword = params.get('q');
            if (keyword) {
                document.getElementById('searchKeyword').value = keyword;
                performSearch();
            } else {
                // 自動加載推薦卡牌
                autoLoadSampleResults();
            }
            
            // 使用事件委託處理詳情按鈕點擊
            document.addEventListener('click', function(e) {
                if (e.target.closest('.btn-detail')) {
                    const card = e.target.closest('.product-card');
                    if (card) {
                        const productId = card.dataset.productId;
                        const name = card.dataset.productName;
                        const price = card.dataset.productPrice;
                        const image = card.dataset.productImage;
                        const shop = card.dataset.productShop;
                        const rating = card.dataset.productRating;
                        
                        showProductDetail(productId, name, price, image, shop, rating);
                    }
                }
            });
        });

        /**
         * 自動加載示例結果
         */
        /**
         * 自動加載推薦卡牌
         */
        function autoLoadSampleResults() {
            console.log('自動加載推薦卡牌...');
            
            try {
                fetch('/api/recommended')
                    .then(response => {
                        if (!response.ok) throw new Error('無法載入推薦卡牌');
                        return response.json();
                    })
                    .then(data => {
                        console.log('推薦卡牌已載入:', data);
                        
                        currentSearchResults = data.recommended;
                        currentFilter = 'all';
                        updatePlatformButtons();
                        displayResults(data.recommended);
                        
                        document.getElementById('resultsSection').classList.add('active');
                        console.log('推薦卡牌已顯示');
                    })
                    .catch(error => {
                        console.error('載入推薦卡牌失敗:', error);
                        // 備用方案：搜尋"卡牌"
                        document.getElementById('searchKeyword').value = '卡牌';
                        performSearch();
                    });
            } catch (error) {
                console.error('自動載入錯誤:', error);
            }
        }

        /**
         * 顯示商品詳情
         */
        function showProductDetail(productId, name, price, image, shop, rating) {
            const modal = document.getElementById('productDetailModal');
            const detailName = document.getElementById('detailProductName');
            const detailImage = document.getElementById('detailProductImage');
            const detailPrice = document.getElementById('detailProductPrice');
            const detailShop = document.getElementById('detailProductShop');
            const detailRating = document.getElementById('detailProductRating');
            
            detailName.textContent = name;
            detailPrice.textContent = `NT$ ${formatPrice(parseFloat(price))}`;
            detailShop.textContent = shop || '未提供';
            detailRating.textContent = rating > 0 ? `⭐ ${parseFloat(rating).toFixed(1)} 星` : '暫無評分';
            
            if (image) {
                detailImage.src = image;
                detailImage.style.display = 'block';
            } else {
                detailImage.style.display = 'none';
            }
            
            const bootstrapModal = new bootstrap.Modal(modal);
            bootstrapModal.show();
        }
    </script>

    <!-- 商品詳情模態框 -->
    <div class="modal fade" id="productDetailModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content" style="background-color: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-primary);">
                <div class="modal-header" style="border-bottom: 1px solid var(--border-color);">
                    <h5 class="modal-title">商品詳情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" style="filter: invert(1);"></button>
                </div>
                <div class="modal-body">
                    <div style="text-align: center; margin-bottom: 2rem;">
                        <img id="detailProductImage" src="" alt="商品圖片" style="max-width: 100%; max-height: 300px; border-radius: 0.5rem; display: none;">
                    </div>
                    
                    <div style="margin-bottom: 1.5rem;">
                        <h4 id="detailProductName" style="color: var(--text-primary); margin-bottom: 1rem;"></h4>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                            <div>
                                <small style="color: var(--text-secondary);">價格</small>
                                <p id="detailProductPrice" style="font-size: 1.5rem; font-weight: 700; color: var(--success-color);"></p>
                            </div>
                            <div>
                                <small style="color: var(--text-secondary);">評分</small>
                                <p id="detailProductRating" style="font-size: 1.2rem; color: var(--warning-color);"></p>
                            </div>
                        </div>
                        
                        <div>
                            <small style="color: var(--text-secondary);">店家</small>
                            <p id="detailProductShop" style="color: var(--text-primary);"></p>
                        </div>
                    </div>
                </div>
                <div class="modal-footer" style="border-top: 1px solid var(--border-color);">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
