<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡牌價格查詢系統 - PChome + 國際卡牌資料庫</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #8b5cf6;
            --success-color: #10b981;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --border-color: #334155;
            --text-primary: #e2e8f0;
            --text-secondary: #cbd5e1;
        }

        * { color-scheme: dark; }

        body {
            background-color: var(--dark-bg);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .navbar {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(139, 92, 246, 0.1) 100%);
            border-bottom: 2px solid var(--border-color);
            padding: 1rem 0;
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .container-main {
            padding: 3rem 1rem;
            min-height: 100vh;
        }

        .search-section {
            margin-bottom: 3rem;
            text-align: center;
        }

        .search-section h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-input-group {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            gap: 0.5rem;
        }

        .search-input-group input {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            flex: 1;
        }

        .search-input-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .search-input-group button {
            background-color: var(--primary-color);
            border: 2px solid var(--primary-color);
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .search-input-group button:hover {
            background-color: var(--secondary-color);
            border-color: var(--secondary-color);
        }

        .platform-tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .platform-btn {
            padding: 0.5rem 1.5rem;
            border: 2px solid var(--border-color);
            background-color: transparent;
            color: var(--text-secondary);
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
        }

        .platform-btn:hover, .platform-btn.active {
            border-color: var(--primary-color);
            background-color: var(--primary-color);
            color: white;
        }

        .results-section.active { display: block; }
        .results-section { display: none; }

        .platform-results { margin-bottom: 3rem; }

        .platform-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
        }

        .platform-icon { font-size: 2rem; }
        .platform-header h2 { margin: 0; font-size: 1.5rem; font-weight: 700; }
        .result-count { margin-left: auto; color: var(--text-secondary); font-size: 0.9rem; }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .product-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            border-color: var(--primary-color);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.2);
        }

        .product-image {
            width: 100%;
            height: 220px;
            background-color: rgba(99, 102, 241, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 1.25rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-shop {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--success-color);
            margin-bottom: 1rem;
        }

        .no-results {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }

        .no-results i {
            font-size: 3rem;
            color: #f59e0b;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .loading {
            text-align: center;
            padding: 3rem 1rem;
        }

        .spinner-border {
            color: var(--primary-color);
            width: 3rem;
            height: 3rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .search-section h1 { font-size: 2rem; }
            .search-input-group { flex-direction: column; }
            .product-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
        }

        .quick-search-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-color);
            background-color: transparent;
            color: var(--text-secondary);
            border-radius: 1.5rem;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .quick-search-btn:hover {
            border-color: var(--primary-color);
            background-color: var(--primary-color);
            color: white;
        }

        /* ===== 卡牌詳情 Modal 樣式 ===== */
        .modal-content {
            background-color: rgba(20, 20, 30, 0.95);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15) 0%, rgba(139, 92, 246, 0.15) 100%);
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
        }

        .modal-title {
            font-weight: 700;
            font-size: 1.3rem;
            color: #FFFFFF !important;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 1) !important;
        }

        .btn-close {
            filter: brightness(1.2);
        }

        #cardModal .modal-body {
            padding: 2rem;
            min-height: 450px;
            background-size: cover;
            background-attachment: fixed;
        }

        /* Modal 內所有文字強制白化 */
        #cardModal h2,
        #cardModal h5,
        #cardModal h6,
        #cardModal p,
        #cardModal span,
        #cardModal div,
        #cardModal label,
        #cardModal td,
        #cardModal th {
            color: #FFFFFF !important;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 1) !important;
        }

        /* 發行版本清單區塊 */
        #cardModalSeries {
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.5) !important;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            margin-top: 1.5rem;
        }

        /* 表格樣式 */
        .modal-body .table {
            color: #FFFFFF !important;
            border-color: rgba(255, 255, 255, 0.1);
        }

        .modal-body .table thead th {
            color: #FFFFFF !important;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2) !important;
            font-weight: 700 !important;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 1) !important;
        }

        .modal-body .table tbody td {
            vertical-align: middle;
            padding: 0.8rem 0.5rem;
            color: #FFFFFF !important;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 1) !important;
        }

        .modal-body .table tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
        }

        .modal-body .table tbody tr:hover {
            background-color: rgba(99, 102, 241, 0.2) !important;
        }
    </style>
</head>
<body>
    <!-- 導航欄 -->
    <nav class="navbar">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><i class="fas fa-credit-card"></i> 卡牌查詢系統</a>
            <span class="navbar-text ms-auto"><small>PChome + 國際卡牌資料庫</small></span>
        </div>
    </nav>

    <!-- 卡牌詳情模態框 -->
    <div id="cardModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="cardModalTitle">卡牌詳情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-5">
                            <img id="cardModalImage" src="" alt="卡牌" style="width: 100%; border-radius: 12px;">
                        </div>
                        <div class="col-md-7">
                            <div id="cardModalDetails" style="max-height: 500px; overflow-y: auto; padding-right: 0.5rem;"></div>
                        </div>
                    </div>
                    
                    <!-- 發行版本清單 -->
                    <div id="cardModalSeries" style="max-height: 300px; overflow-y: auto; margin-top: 1.5rem;">
                        <p class="text-muted" style="color: #A0A0A0;">無版本信息</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 主容器 -->
    <div class="container-main">
        <!-- 搜索區域 -->
        <div class="search-section">
            <h1>🎴 卡牌價格與資料查詢</h1>
            <p>搜尋 PChome 台灣價格 + 國際卡牌參考資料</p>
            
            <div class="search-input-group">
                <input type="text" id="searchKeyword" placeholder="搜尋建議：遊戲王卡牌, 寶可夢卡牌..." onkeyup="handleKeyboardSearch(event)">
                <button onclick="performSearch()"><i class="fas fa-search"></i> 搜尋</button>
            </div>

            <!-- 搜尋模式選擇 -->
            <div class="platform-tabs" style="margin-top: 2rem;">
                <button class="platform-btn active" onclick="setSearchMode('ecommerce')">
                    <i class="fas fa-shopping-cart"></i> 台灣 PChome
                </button>
                <button class="platform-btn" onclick="setSearchMode('international')">
                    <i class="fas fa-globe"></i> 國際卡牌 API
                </button>
                <button class="platform-btn" onclick="setSearchMode('combined')">
                    <i class="fas fa-plus"></i> 組合搜尋
                </button>
            </div>

            <!-- 提示信息 -->
            <div id="searchHint" style="margin-top: 1.5rem; padding: 1rem; background-color: rgba(99, 102, 241, 0.1); border-left: 4px solid #6366f1; border-radius: 0.5rem; color: #cbd5e1; font-size: 0.95rem;">
                <i class="fas fa-lightbulb"></i> <strong id="hintTitle">台灣 PChome</strong>：搜尋 <span id="hintExamples">遊戲王卡牌、寶可夢卡牌、集換式卡牌</span>
            </div>

            <!-- 快速搜尋建議 -->
            <div style="margin-top: 1rem; display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center;">
                <button class="quick-search-btn" onclick="quickSearch('遊戲王卡牌')">遊戲王卡牌</button>
                <button class="quick-search-btn" onclick="quickSearch('寶可夢')">寶可夢</button>
                <button class="quick-search-btn" onclick="quickSearch('pikachu')">Pikachu</button>
                <button class="quick-search-btn" onclick="quickSearch('black lotus')">Black Lotus</button>
            </div>
        </div>

        <!-- 結果區域 -->
        <div class="results-section active" id="resultsSection">
            <div id="searchResults"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentSearchResults = {};
        let searchMode = 'ecommerce';
        
        // 分頁狀態
        let currentCardSearch = {
            keyword: '',
            source: 'all',
            page: 1,
            limit: 20,
            results: null
        };

        /** 根據卡牌屬性獲取動態漸層背景 */
        function getTypeGradient(card) {
            const stats = card.stats || {};
            let type = '';
            
            if (card.source === 'pokemon' && stats.types && stats.types.length > 0) {
                type = stats.types[0].toLowerCase();
            } else if (card.source === 'yugioh' && stats.attribute) {
                type = stats.attribute.toLowerCase();
            } else if (card.source === 'mtg' && stats.type) {
                type = stats.type.toLowerCase();
            }
            
            const gradients = {
                'fire': 'linear-gradient(145deg, #a80000, #000000)',
                'water': 'linear-gradient(145deg, #003366, #000000)',
                'grass': 'linear-gradient(145deg, #1b4d3e, #000000)',
                'leaf': 'linear-gradient(145deg, #1b4d3e, #000000)',
                'electric': 'linear-gradient(145deg, #b8860b, #1a1a1a)',
                'psychic': 'linear-gradient(145deg, #4b0082, #000000)',
                'dark': 'linear-gradient(145deg, #4b0082, #000000)',
                'default': 'linear-gradient(145deg, #2c3e50, #000000)'
            };
            
            return gradients[type] || gradients['default'];
        }

        /** 打開卡牌詳情模態框 */
        function showCardDetail(card) {
            const modal = new bootstrap.Modal(document.getElementById('cardModal'));
            const modalBody = document.querySelector('#cardModal .modal-body');
            
            // 動態設定背景到 modal-body
            const gradient = getTypeGradient(card);
            modalBody.style.background = gradient;
            modalBody.style.backgroundAttachment = 'fixed';
            
            document.getElementById('cardModalTitle').textContent = card.title;
            document.getElementById('cardModalImage').src = card.img_large || card.img_url || '';
            
            // 圖片樣式：加入發光效果
            const imgElement = document.getElementById('cardModalImage');
            imgElement.style.boxShadow = '0 0 20px rgba(255, 255, 255, 0.5), 0 0 40px rgba(255, 255, 255, 0.3)';
            imgElement.style.borderRadius = '12px';
            
            // 定義文本樣式常數 - 使用更重的陰影和純白色
            const textShadow = 'text-shadow: 2px 2px 5px rgba(0, 0, 0, 1) !important;';
            const labelStyle = `color: #CCCCCC !important; ${textShadow} font-weight: 500 !important;`;
            const valueStyle = `color: #FFFFFF !important; ${textShadow} font-weight: 700 !important;`;
            const titleStyle = `color: #FFFFFF !important; ${textShadow} font-size: 1.3rem; margin-bottom: 1.5rem; font-weight: 700 !important;`;
            const descriptionStyle = `color: #FFFFFF !important; ${textShadow} font-size: 0.95rem; line-height: 1.7; margin-top: 1rem;`;
            
            // 構建詳細信息 - 使用 Flex 佈局
            let detailsHTML = `<h5 style="${titleStyle}">${card.title}</h5>`;
            
            // 使用 Flex 佈局讓標籤和值左右對齐
            detailsHTML += `<div style="display: flex !important; justify-content: space-between !important; align-items: center !important; margin: 0.8rem 0 !important; padding: 8px 0 !important; border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;">
                <span style="${labelStyle}">來源:</span>
                <span style="${valueStyle}">${getSourceName(card.source)}</span>
            </div>`;
            
            detailsHTML += `<div style="display: flex !important; justify-content: space-between !important; align-items: center !important; margin: 0.8rem 0 !important; padding: 8px 0 !important; border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;">
                <span style="${labelStyle}">價格:</span>
                <span style="${valueStyle}">$${card.price || 'N/A'}</span>
            </div>`;
            
            // 根據卡牌類型顯示不同的屬性
            const stats = card.stats || {};
            
            if (card.source === 'pokemon') {
                detailsHTML += `<div style="display: flex !important; justify-content: space-between !important; align-items: center !important; margin: 0.8rem 0 !important; padding: 8px 0 !important; border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;">
                    <span style="${labelStyle}">HP:</span>
                    <span style="${valueStyle}">${stats.hp || 'N/A'}</span>
                </div>`;
                detailsHTML += `<div style="display: flex !important; justify-content: space-between !important; align-items: center !important; margin: 0.8rem 0 !important; padding: 8px 0 !important; border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;">
                    <span style="${labelStyle}">屬性:</span>
                    <span style="${valueStyle}">${stats.types ? stats.types.join(', ') : 'N/A'}</span>
                </div>`;
                detailsHTML += `<div style="display: flex !important; justify-content: space-between !important; align-items: center !important; margin: 0.8rem 0 !important; padding: 8px 0 !important; border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;">
                    <span style="${labelStyle}">系列:</span>
                    <span style="${valueStyle}">${stats.set || 'N/A'}</span>
                </div>`;
                detailsHTML += `<div style="display: flex !important; justify-content: space-between !important; align-items: center !important; margin: 0.8rem 0 !important; padding: 8px 0 !important; border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;">
                    <span style="${labelStyle}">稀有度:</span>
                    <span style="${valueStyle}">${stats.rarity || 'N/A'}</span>
                </div>`;
            } else if (card.source === 'yugioh') {
                detailsHTML += `<div style="display: flex !important; justify-content: space-between !important; align-items: center !important; margin: 0.8rem 0 !important; padding: 8px 0 !important; border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;">
                    <span style="${labelStyle}">類型:</span>
                    <span style="${valueStyle}">${stats.type || 'N/A'}</span>
                </div>`;
                if (stats.level) {
                    detailsHTML += `<div style="display: flex !important; justify-content: space-between !important; align-items: center !important; margin: 0.8rem 0 !important; padding: 8px 0 !important; border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;">
                        <span style="${labelStyle}">等級:</span>
                        <span style="${valueStyle}">${stats.level}</span>
                    </div>`;
                }
                detailsHTML += `<div style="display: flex !important; justify-content: space-between !important; align-items: center !important; margin: 0.8rem 0 !important; padding: 8px 0 !important; border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;">
                    <span style="${labelStyle}">屬性:</span>
                    <span style="${valueStyle}">${stats.attribute || 'N/A'}</span>
                </div>`;
                detailsHTML += `<div style="display: flex !important; justify-content: space-between !important; align-items: center !important; margin: 0.8rem 0 !important; padding: 8px 0 !important; border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;">
                    <span style="${labelStyle}">攻防:</span>
                    <span style="${valueStyle}">${stats.atk} / ${stats.def}</span>
                </div>`;
                detailsHTML += `<div style="display: flex !important; justify-content: space-between !important; align-items: center !important; margin: 0.8rem 0 !important; padding: 8px 0 !important; border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;">
                    <span style="${labelStyle}">種族:</span>
                    <span style="${valueStyle}">${stats.race || 'N/A'}</span>
                </div>`;
            } else if (card.source === 'mtg') {
                detailsHTML += `<div style="display: flex !important; justify-content: space-between !important; align-items: center !important; margin: 0.8rem 0 !important; padding: 8px 0 !important; border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;">
                    <span style="${labelStyle}">法力費:</span>
                    <span style="${valueStyle}">${stats.mana_cost || 'N/A'}</span>
                </div>`;
                detailsHTML += `<div style="display: flex !important; justify-content: space-between !important; align-items: center !important; margin: 0.8rem 0 !important; padding: 8px 0 !important; border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;">
                    <span style="${labelStyle}">類型:</span>
                    <span style="${valueStyle}">${stats.type || 'N/A'}</span>
                </div>`;
                if (stats.power || stats.toughness) {
                    detailsHTML += `<div style="display: flex !important; justify-content: space-between !important; align-items: center !important; margin: 0.8rem 0 !important; padding: 8px 0 !important; border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;">
                        <span style="${labelStyle}">攻防:</span>
                        <span style="${valueStyle}">${stats.power} / ${stats.toughness}</span>
                    </div>`;
                }
                detailsHTML += `<div style="display: flex !important; justify-content: space-between !important; align-items: center !important; margin: 0.8rem 0 !important; padding: 8px 0 !important; border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;">
                    <span style="${labelStyle}">稀有度:</span>
                    <span style="${valueStyle}">${stats.rarity || 'N/A'}</span>
                </div>`;
            }
            
            detailsHTML += `<p style="${descriptionStyle}">${card.description || '無描述'}</p>`;
            
            document.getElementById('cardModalDetails').innerHTML = detailsHTML;
            
            // 顯示發行版本清單 - 完整改進樣式
            if (card.series && card.series.length > 0) {
                let seriesHTML = `<div style="background: rgba(0, 0, 0, 0.5) !important; padding: 15px !important; border-radius: 8px !important; margin-top: 1.5rem !important; border: 1px solid rgba(255, 255, 255, 0.15) !important;">
                    <h6 style="color: #FFFFFF !important; ${textShadow} margin-bottom: 1rem !important; padding-bottom: 0.8rem !important; border-bottom: 2px solid rgba(255, 255, 255, 0.2) !important; font-size: 1.1rem !important;">發行版本清單</h6>
                    <table class="table table-sm" style="margin-bottom: 0 !important; color: #FFFFFF !important;">

        function getSourceName(source) {
            const names = {
                'pokemon': '寶可夢 TCG',
                'yugioh': '遊戲王',
                'mtg': 'Magic 風雲會'
            };
            return names[source] || source;
        }

        /** 設定搜尋模式 */
        function setSearchMode(mode) {
            searchMode = mode;
            console.log('切換搜尋模式:', mode);
            
            document.querySelectorAll('.platform-tabs .platform-btn').forEach((btn, i) => {
                const modes = ['ecommerce', 'international', 'combined'];
                btn.classList.toggle('active', modes[i] === mode);
            });

            // 更新提示信息
            const hints = {
                'ecommerce': {
                    title: '台灣 PChome',
                    examples: '遊戲王卡牌、寶可夢卡牌、集換式卡牌、補充包',
                    placeholder: '搜尋建議：遊戲王卡牌, 寶可夢卡牌...'
                },
                'international': {
                    title: '國際卡牌 API',
                    examples: '英文卡牌名稱：pikachu、blue eyes、black lotus',
                    placeholder: '搜尋建議：pikachu, blue eyes, black lotus...'
                },
                'combined': {
                    title: '組合搜尋',
                    examples: '同時搜尋台灣價格與國際卡牌資料庫',
                    placeholder: '搜尋建議：任何卡牌名稱都可以...'
                }
            };

            const hint = hints[mode];
            document.getElementById('hintTitle').textContent = hint.title;
            document.getElementById('hintExamples').textContent = hint.examples;
            document.getElementById('searchKeyword').placeholder = hint.placeholder;
        }

        /** 快速搜尋按鈕 */
        function quickSearch(keyword) {
            document.getElementById('searchKeyword').value = keyword;
            performSearch();
        }

        /** 執行搜尋 */
        async function performSearch() {
            const keyword = document.getElementById('searchKeyword').value.trim();
            if (!keyword || keyword.length < 2) {
                alert('請輸入至少 2 個字符');
                return;
            }

            // 如果是國際卡牌搜尋，使用新的分頁 API
            if (searchMode === 'international') {
                currentCardSearch.keyword = keyword;
                currentCardSearch.page = 1;  // 重置到第 1 頁
                await performCardSearch();
                return;
            }

            try {
                let url;
                if (searchMode === 'combined') {
                    url = `/api/combined-search?keyword=${encodeURIComponent(keyword)}`;
                } else {
                    url = `/api/search?keyword=${encodeURIComponent(keyword)}`;
                }
                
                console.log('📡 [API 請求]', searchMode === 'combined' ? '組合搜尋' : 'PChome 搜尋', url);
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    credentials: 'include'
                });
                
                console.log(`📊 [API 回應] 狀態碼: ${response.status}`);
                
                const data = await response.json();

                if (!response.ok) {
                    const errorMsg = data.error || `HTTP ${response.status}`;
                    console.error('❌ [API 錯誤]', {
                        status: response.status,
                        searchMode: searchMode,
                        error: errorMsg,
                        details: data
                    });
                    alert('搜尋失敗: ' + errorMsg);
                    return;
                }

                console.log('✅ [API 成功]', searchMode === 'combined' ? '組合搜尋' : 'PChome 搜尋', {
                    resultCount: Object.keys(data.results || {}).length
                });

                if (searchMode === 'combined') {
                    displayCombinedResults(data);
                } else {
                    currentSearchResults = data.results || {};
                    displayResults(currentSearchResults);
                }
            } catch (error) {
                console.error('❌ [網路錯誤]', {
                    name: error.name,
                    message: error.message,
                    searchMode: searchMode,
                    stack: error.stack
                });
                alert('搜尋失敗: ' + error.message + '\n\n請檢查網路連接或查看瀏覽器控制台了解詳情');
            }
        }
        
        /** 國際卡牌搜尋（支持分頁） */
        async function performCardSearch() {
            const { keyword, source, page, limit } = currentCardSearch;
            
            try {
                const url = `/api/cards/search?keyword=${encodeURIComponent(keyword)}&source=${source}&page=${page}&limit=${limit}`;
                console.log('📡 [API 請求] 卡牌搜尋:', url);
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    credentials: 'include'
                });
                
                console.log(`📊 [API 回應] 狀態碼: ${response.status}`);
                
                const data = await response.json();
                
                if (!response.ok) {
                    const errorMsg = data.error || `HTTP ${response.status}: ${response.statusText}`;
                    
                    // 🔴 詳細錯誤日誌 - 包含所有可能的診斷信息
                    console.error('❌ [API 返回錯誤]', {
                        status: response.status,
                        statusText: response.statusText,
                        error: errorMsg,
                        responseType: response.headers.get('content-type'),
                        fullResponse: data,  // 完整的服務器响应
                        timestamp: new Date().toISOString()
                    });
                    
                    // 按錯誤類型提供詳細診斷
                    if (response.status === 404) {
                        console.error('❌ 404 錯誤: API 端點不存在或資源未找到');
                        console.error('請求 URL:', url);
                    } else if (response.status === 500) {
                        console.error('❌ 500 錯誤: 服務器內部錯誤');
                        console.error('服務器錯誤詳情:', data.details || data.error);
                    } else if (response.status === 503) {
                        console.error('❌ 503 錯誤: 服務暫時不可用（可能是 API 超時或過載）');
                    }
                    
                    alert('搜尋失敗: ' + errorMsg);
                    return;
                }
                
                console.log('✅ [API 成功] 卡牌搜尋結果:', {
                    source: data.source,
                    cardCount: data.cards ? data.cards.length : (data.results ? Object.keys(data.results).length : 0),
                    total: data.total || 0,
                    pages: data.pages || 0
                });
                
                currentCardSearch.results = data;
                displayCardSearchResults(data);
            } catch (error) {
                // 🔴 詳細的網路錯誤日誌
                console.error('❌ [網路/FETCH 錯誤] 卡牌搜尋失敗', {
                    name: error.name,
                    message: error.message,
                    stack: error.stack,
                    errorType: error.constructor.name,
                    timestamp: new Date().toISOString(),
                    searchParams: {
                        keyword: keyword,
                        source: source,
                        page: page,
                        limit: limit
                    }
                });
                
                // 診斷錯誤類型
                if (error.name === 'TypeError') {
                    console.error('💡 可能原因: 網路連接問題、CORS 錯誤或伺服器無響應');
                    console.error('請檢查: 1) 網路連接, 2) 瀏覽器網路標籤, 3) CORS Headers');
                } else if (error.message.includes('Failed to fetch')) {
                    console.error('💡 可能原因: CORS 被阻擋或跨域請求失敗');
                    console.error('請檢查服務器的 CORS 設置');
                }
                
                // 詳細診斷信息
                const errorDetails = {
                    '時間': new Date().toISOString(),
                    '關鍵字': keyword,
                    '源': source,
                    '錯誤類型': error.name,
                    '錯誤信息': error.message
                };
                
                console.error('📋 [完整診斷信息]', errorDetails);
                alert('搜尋失敗: ' + error.message + '\n\n請檢查網路連接或查看瀏覽器控制台了解詳情');
            }
        }
        
        /** 顯示卡牌搜尋結果 */
        function displayCardSearchResults(data) {
            const container = document.getElementById('searchResults');
            const source = data.source;
            
            let html = '';
            
            // 顯示來源標題
            if (source === 'all') {
                // 顯示所有來源的結果
                const sources = ['pokemon', 'yugioh', 'mtg'];
                const results = data.results || {};
                
                sources.forEach(src => {
                    const srcData = results[src] || {};
                    if (srcData.cards && srcData.cards.length > 0) {
                        html += displayCardSource(src, srcData);
                    }
                });
            } else {
                // 顯示單一來源
                html += displayCardSource(source, data);
            }
            
            if (!html) {
                container.innerHTML = '<div class="no-results"><i class="fas fa-search"></i><h3>未找到卡牌</h3></div>';
                return;
            }
            
            container.innerHTML = html;
        }
        
        /** 顯示單一卡牌來源及其分頁 */
        function displayCardSource(source, data) {
            const cards = data.cards || [];
            const total = data.total || 0;
            const pages = data.pages || 0;
            const currentPage = data.current_page || 1;
            
            const sourceNames = {
                'pokemon': '⚡ 寶可夢 TCG',
                'yugioh': '🎴 遊戲王',
                'mtg': '🪄 魔法風雲會'
            };
            
            let html = `
                <div class="platform-results">
                    <div class="platform-header" style="border-bottom-color: ${source === 'pokemon' ? '#FF6B6B' : source === 'yugioh' ? '#FFD700' : '#9932CC'};">
                        <h2>${sourceNames[source]}</h2>
                        <span class="result-count">${cards.length} / ${total}</span>
                    </div>
                    <div class="product-grid">
                        ${cards.map(card => createCardElement(card, source)).join('')}
                    </div>
                    
                    <!-- 分頁控制 -->
                    ${pages > 1 ? createPaginationControls(source, currentPage, pages) : ''}
                </div>
            `;
            
            return html;
        }
        
        /** 創建卡牌元素 */
        function createCardElement(card, source) {
            return `
                <div class="product-card" style="cursor: pointer;" onclick="showCardDetail(${JSON.stringify(card).replace(/"/g, '&quot;')})">
                    <div class="product-image">
                        <img src="${card.img_url || ''}" alt="${card.title}" onerror="this.src='https://picsum.photos/280/220'" style="cursor: pointer;">
                    </div>
                    <div class="product-info">
                        <div class="product-name">${card.title}</div>
                        <div style="font-size: 0.8rem; color: #888; margin: 0.3rem 0;">
                            $${card.price || 'N/A'}
                        </div>
                        <div style="font-size: 0.75rem; color: #aaa;">
                            ${card.stats?.set || card.stats?.type || ''}
                        </div>
                    </div>
                </div>
            `;
        }
        
        /** 生成分頁控制按鈕 */
        function createPaginationControls(source, currentPage, totalPages) {
            let html = `<div style="margin-top: 2rem; display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap;">`;
            
            // 上一頁
            if (currentPage > 1) {
                html += `<button class="btn btn-sm btn-outline-primary" onclick="goToPage(${currentPage - 1})">← 上一頁</button>`;
            }
            
            // 頁碼顯示
            html += `<span style="padding: 0.4rem 0.8rem; background: #f0f0f0; border-radius: 4px;">第 ${currentPage} / ${totalPages} 頁</span>`;
            
            // 下一頁
            if (currentPage < totalPages) {
                html += `<button class="btn btn-sm btn-outline-primary" onclick="goToPage(${currentPage + 1})">下一頁 →</button>`;
            }
            
            html += '</div>';
            return html;
        }
        
        /** 轉到指定頁數 */
        function goToPage(page) {
            currentCardSearch.page = page;
            performCardSearch();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        /** 顯示 PChome 結果 */
        function displayResults(results) {
            const container = document.getElementById('searchResults');
            const pchomeItems = results.pchome || [];
            
            if (!pchomeItems.length) {
                container.innerHTML = '<div class="no-results"><i class="fas fa-search"></i><h3>未找到商品</h3></div>';
                return;
            }

            container.innerHTML = `
                <div class="platform-results">
                    <div class="platform-header platform-pchome">
                        <span class="platform-icon">🛒</span>
                        <h2>PChome 24h</h2>
                        <span class="result-count">${pchomeItems.length} 個商品</span>
                    </div>
                    <div class="product-grid">
                        ${pchomeItems.map(item => `
                            <div class="product-card">
                                <div class="product-image">
                                    <img src="${item.image || ''}" alt="${item.name}" onerror="this.src='https://picsum.photos/280/220'">
                                </div>
                                <div class="product-info">
                                    <div class="product-name">${item.name || ''}</div>
                                    <div class="product-shop"><i class="fas fa-store"></i> ${item.shop || 'PChome'}</div>
                                    <div class="product-price">NT$ ${Number(item.price).toLocaleString()}</div>
                                    <a href="${item.url || '#'}" target="_blank" class="btn" style="margin-top: auto; background-color: var(--primary-color); color: white; text-decoration: none; padding: 0.75rem; border-radius: 0.5rem; text-align: center;">購買</a>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        /** 顯示國際卡牌結果 */
        function displayInternationalResults(data) {
            const container = document.getElementById('searchResults');
            const refs = data.references || {};
            
            let html = '';
            const cardConfig = {
                'yugioh': { name: '🎴 遊戲王', color: '#FFD700' },
                'pokemon': { name: '⚡ 寶可夢卡牌', color: '#FF6B6B' },
                'mtg': { name: '🪄 魔法風雲會', color: '#9932CC' }
            };

            for (const [source, cards] of Object.entries(refs)) {
                if (!cards || !cards.length) continue;
                const cfg = cardConfig[source];
                
                html += `
                    <div class="platform-results">
                        <div class="platform-header" style="border-bottom-color: ${cfg.color};">
                            <h2>${cfg.name}</h2>
                            <span class="result-count">${cards.length}</span>
                        </div>
                        <div class="product-grid">
                            ${cards.map(card => createCardDetail(card, source)).join('')}
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html || '<div class="no-results"><i class="fas fa-search"></i><h3>未找到內容</h3></div>';
        }

        /** 創建卡牌詳細信息卡片 */

                            <div style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.5rem;">
                                <strong>ID:</strong> #${card.id || 'N/A'}

                            <!-- 屬性 -->

        /** 顯示組合結果 */
        function displayCombinedResults(data) {
            const container = document.getElementById('searchResults');
            let html = '';

            // 台灣價格
            const pchomeItems = (data.taipei_prices?.pchome || []);
            if (pchomeItems.length) {
                html += `
                    <div class="platform-results">
                        <div class="platform-header platform-pchome">
                            <h2>🇹🇼 台灣價格 (PChome)</h2>
                            <span class="result-count">${pchomeItems.length}</span>
                        </div>
                        <div class="product-grid">
                            ${pchomeItems.map(item => `
                                <div class="product-card">
                                    <div class="product-image"><img src="${item.image}" alt="${item.name}" onerror="this.src='https://picsum.photos/280/220'"></div>
                                    <div class="product-info">
                                        <div class="product-name">${item.name}</div>
                                        <div class="product-price">NT$ ${Number(item.price).toLocaleString()}</div>
                                        <a href="${item.url || '#'}" target="_blank" class="btn" style="margin-top: auto; background-color: var(--primary-color); color: white; text-decoration: none; padding: 0.75rem; border-radius: 0.5rem; text-align: center;">購買</a>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            // 國際卡牌參考
            const refs = data.international_references || {};
            const cardConfig = {
                'yugioh': { name: '🎴 遊戲王', color: '#FFD700' },
                'pokemon': { name: '⚡ 寶可夢', color: '#FF6B6B' },
                'mtg': { name: '🪄 魔法風雲會', color: '#9932CC' }
            };

            for (const [source, cards] of Object.entries(refs)) {
                if (!cards || !cards.length) continue;
                const cfg = cardConfig[source];
                
                html += `
                    <div class="platform-results">
                        <div class="platform-header" style="border-bottom-color: ${cfg.color};">
                            <h2>${cfg.name}</h2>
                            <span class="result-count">${cards.length} 張</span>
                        </div>
                        <div class="product-grid">
                            ${cards.map(card => `
                                <div class="product-card">
                                    <div class="product-image"><img src="${card.img_url}" alt="${card.title}" onerror="this.src='https://picsum.photos/280/220'"></div>
                                    <div class="product-info">
                                        <div class="product-name">${card.title}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html || '<div class="no-results"><i class="fas fa-search"></i><h3>未找到內容</h3></div>';
        }

        /** 輔助函數 */
        function handleKeyboardSearch(event) {
            if (event.key === 'Enter') performSearch();
        }

        /** 頁面載入時自動搜尋 */
        document.addEventListener('DOMContentLoaded', function() {
            console.log('頁面已載入');
            document.getElementById('searchKeyword').value = '遊戲王';
            performSearch();
        });
    </script>
</body>
</html>
