<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡牌價格查詢系統 - 一站式卡牌搜尋平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #8b5cf6;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --border-color: #334155;
            --text-primary: #e2e8f0;
            --text-secondary: #cbd5e1;
        }

        * {
            color-scheme: dark;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        /* 導航欄 */
        .navbar {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(139, 92, 246, 0.1) 100%);
            border-bottom: 2px solid var(--border-color);
            padding: 1rem 0;
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 主容器 */
        .container-main {
            padding: 3rem 1rem;
            min-height: 100vh;
        }

        /* 搜索區域 */
        .search-section {
            margin-bottom: 3rem;
            text-align: center;
        }

        .search-section h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-section p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .search-input-group {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            gap: 0.5rem;
        }

        .search-input-group input {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: all 0.3s ease;
            flex: 1;
        }

        .search-input-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .search-input-group button {
            background-color: var(--primary-color);
            border: 2px solid var(--primary-color);
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .search-input-group button:hover {
            background-color: var(--secondary-color);
            border-color: var(--secondary-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .search-input-group button:active {
            transform: translateY(0);
        }

        /* 平台標籤 */
        .platform-tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .platform-btn {
            padding: 0.5rem 1.5rem;
            border: 2px solid var(--border-color);
            background-color: transparent;
            color: var(--text-secondary);
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .platform-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .platform-btn.active {
            border-color: var(--primary-color);
            background-color: var(--primary-color);
            color: white;
        }

        /* 結果區域 */
        .results-section {
            display: none;
        }

        .results-section.active {
            display: block;
        }

        .platform-results {
            margin-bottom: 3rem;
        }

        .platform-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
        }

        .platform-icon {
            font-size: 2rem;
        }

        .platform-header h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .result-count {
            margin-left: auto;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* 商品卡片 */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .product-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            border-color: var(--primary-color);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.2);
        }

        .product-image {
            width: 100%;
            height: 220px;
            background-color: rgba(99, 102, 241, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 1.25rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-shop {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
        }

        .rating {
            font-size: 0.85rem;
            color: var(--warning-color);
            margin-bottom: 0.75rem;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--success-color);
            margin-bottom: 1rem;
        }

        .product-footer {
            display: flex;
            gap: 0.5rem;
            margin-top: auto;
        }

        .btn-visit {
            flex: 1;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            text-align: center;
        }

        .btn-visit:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
        }

        /* 載入狀態 */
        .loading {
            text-align: center;
            padding: 3rem 1rem;
        }

        .spinner-border {
            color: var(--primary-color);
            width: 3rem;
            height: 3rem;
            margin-bottom: 1rem;
        }

        /* 空結果 */
        .no-results {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }

        .no-results i {
            font-size: 3rem;
            color: var(--warning-color);
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* 響應式設計 */
        @media (max-width: 768px) {
            .search-section h1 {
                font-size: 2rem;
            }

            .search-input-group {
                flex-direction: column;
            }

            .product-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 1rem;
            }

            .platform-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .result-count {
                margin-left: 0;
            }
        }

        /* 平台顏色 */
        .platform-shopee {
            --platform-color: #ee7752;
        }

        .platform-ruten {
            --platform-color: #d32f2f;
        }

        .platform-yahoo {
            --platform-color: #ffd700;
        }

        .platform-pchome {
            --platform-color: #00b4d8;
        }

        .platform-header {
            --platform-color: var(--primary-color);
        }

        .platform-header.platform-shopee {
            border-bottom-color: #ee7752;
        }

        .platform-header.platform-ruten {
            border-bottom-color: #d32f2f;
        }

        .platform-header.platform-yahoo {
            border-bottom-color: #ffd700;
        }

        .platform-header.platform-pchome {
            border-bottom-color: #00b4d8;
        }

        /* 動畫 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .product-card {
            animation: fadeIn 0.3s ease-out;
        }

        .platform-results {
            animation: fadeIn 0.4s ease-out;
        }
    </style>
</head>
<body>
    <!-- 導航欄 -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-credit-card"></i> 卡牌價格查詢系統
            </a>
            <span class="navbar-text ms-auto">
                <small>一站式卡牌搜尋平台</small>
            </span>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="container-main">
        <!-- 搜索區域 -->
        <div class="search-section">
            <h1>🎴 卡牌價格比較</h1>
            <p>在所有主要平台上搜尋卡牌價格，快速找到最佳交易</p>
            
            <div class="search-input-group">
                <input 
                    type="text" 
                    id="searchKeyword" 
                    placeholder="輸入卡牌名稱 (例：藍眼白龍、黑魔法師)..." 
                    onkeyup="handleKeyboardSearch(event)"
                >
                <button onclick="performSearch()" id="searchBtn">
                    <i class="fas fa-search"></i> 搜尋
                </button>
            </div>

            <!-- 平台篩選 -->
            <div class="platform-tabs">
                <button class="platform-btn active" onclick="filterByPlatform('all')">
                    <i class="fas fa-th"></i> 全部平台
                </button>
                <button class="platform-btn" onclick="filterByPlatform('shopee')">
                    <i class="fas fa-shrimp"></i> 蝦皮 Shopee
                </button>
                <button class="platform-btn" onclick="filterByPlatform('ruten')">
                    <i class="fas fa-store"></i> 露天拍賣
                </button>
                <button class="platform-btn" onclick="filterByPlatform('yahoo')">
                    <i class="fas fa-gavel"></i> Yahoo 奇摩
                </button>
                <button class="platform-btn" onclick="filterByPlatform('pchome')">
                    <i class="fas fa-shopping-cart"></i> PChome
                </button>
            </div>
        </div>

        <!-- 結果區域 -->
        <div class="results-section" id="resultsSection">
            <!-- 載入中 -->
            <div class="loading" id="loadingSection" style="display: none;">
                <div class="spinner-border" role="status"></div>
                <p>正在搜尋多個平台...</p>
            </div>

            <!-- 搜索結果 -->
            <div id="searchResults"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentSearchResults = {};
        let currentFilter = 'all';

        /**
         * 執行搜尋
         */
        async function performSearch() {
            const keyword = document.getElementById('searchKeyword').value.trim();
            
            if (!keyword || keyword.length < 2) {
                alert('請輸入至少 2 個字符');
                return;
            }

            showLoading(true);
            
            try {
                const response = await fetch(`/api/search?keyword=${encodeURIComponent(keyword)}`);
                const data = await response.json();

                if (!response.ok) {
                    alert(data.error || '搜尋失敗，請稍後重試');
                    showLoading(false);
                    return;
                }

                currentSearchResults = data.results;
                currentFilter = 'all';
                updatePlatformButtons();
                displayResults(data.results);
                
                document.getElementById('resultsSection').classList.add('active');
            } catch (error) {
                console.error('搜尋錯誤:', error);
                alert('搜尋失敗，請檢查網路連線');
            } finally {
                showLoading(false);
            }
        }

        /**
         * 鍵盤搜尋
         */
        function handleKeyboardSearch(event) {
            if (event.key === 'Enter') {
                performSearch();
            }
        }

        /**
         * 顯示/隱藏載入狀態
         */
        function showLoading(show) {
            document.getElementById('loadingSection').style.display = show ? 'block' : 'none';
        }

        /**
         * 顯示搜尋結果
         */
        function displayResults(results) {
            const resultsContainer = document.getElementById('searchResults');
            resultsContainer.innerHTML = '';

            const platformConfig = {
                'shopee': {
                    name: '🦐 蝦皮 Shopee',
                    icon: '🦐',
                    color: '#ee7752'
                },
                'ruten': {
                    name: '🏪 露天拍賣',
                    icon: '🏪',
                    color: '#d32f2f'
                },
                'yahoo': {
                    name: '🔨 Yahoo 奇摩',
                    icon: '🔨',
                    color: '#ffd700'
                },
                'pchome': {
                    name: '🛒 PChome 24h',
                    icon: '🛒',
                    color: '#00b4d8'
                }
            };

            // 過濾結果
            const filteredResults = {};
            for (const [platform, items] of Object.entries(results)) {
                if (currentFilter === 'all' || currentFilter === platform) {
                    if (items.length > 0) {
                        filteredResults[platform] = items;
                    }
                }
            }

            // 如果沒有結果
            if (Object.keys(filteredResults).length === 0) {
                resultsContainer.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search"></i>
                        <h3>未找到符合的商品</h3>
                        <p>請嘗試其他搜尋關鍵字</p>
                    </div>
                `;
                return;
            }

            // 顯示各平台結果
            for (const [platform, items] of Object.entries(filteredResults)) {
                const config = platformConfig[platform];
                
                const platformHtml = `
                    <div class="platform-results">
                        <div class="platform-header platform-${platform}">
                            <span class="platform-icon">${config.icon}</span>
                            <h2>${config.name}</h2>
                            <span class="result-count">${items.length} 個商品</span>
                        </div>

                        <div class="product-grid">
                            ${items.map(item => createProductCard(item)).join('')}
                        </div>
                    </div>
                `;
                
                resultsContainer.innerHTML += platformHtml;
            }
        }

        /**
         * 創建商品卡片 HTML
         */
        function createProductCard(item) {
            const hasImage = item.image && item.image !== '';
            const imageHtml = hasImage 
                ? `<img src="${item.image}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/280x220?text=No+Image'">`
                : `<div style="display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; color: var(--text-secondary);"><i class="fas fa-image" style="font-size: 3rem; opacity: 0.3;"></i></div>`;

            const ratingHtml = item.rating && item.rating > 0 
                ? `<div class="rating">⭐ ${item.rating.toFixed(1)} (${item.rating > 4 ? '推薦' : '普通'})</div>`
                : '';

            return `
                <div class="product-card">
                    <div class="product-image">
                        ${imageHtml}
                    </div>
                    <div class="product-info">
                        <div class="product-name">${item.name}</div>
                        ${item.shop ? `<div class="product-shop"><i class="fas fa-store"></i> ${item.shop}</div>` : ''}
                        ${ratingHtml}
                        <div class="product-price">NT$ ${formatPrice(item.price)}</div>
                        <div class="product-footer">
                            <a href="${item.url}" target="_blank" class="btn-visit">
                                <i class="fas fa-external-link-alt"></i> 查看商品
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }

        /**
         * 格式化價格
         */
        function formatPrice(price) {
            return parseFloat(price).toLocaleString('zh-TW', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            });
        }

        /**
         * 按平台篩選結果
         */
        function filterByPlatform(platform) {
            currentFilter = platform;
            updatePlatformButtons();
            
            const results = {};
            for (const [p, items] of Object.entries(currentSearchResults)) {
                if (platform === 'all' || platform === p) {
                    results[p] = items;
                }
            }
            
            displayResults(results);
        }

        /**
         * 更新平台按鈕狀態
         */
        function updatePlatformButtons() {
            document.querySelectorAll('.platform-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            const activeBtn = Array.from(document.querySelectorAll('.platform-btn')).find(btn => {
                if (currentFilter === 'all') {
                    return btn.textContent.includes('全部');
                }
                return btn.onclick.toString().includes(currentFilter);
            });
            
            if (activeBtn) {
                activeBtn.classList.add('active');
            }
        }

        /**
         * 頁面載入時自動聚焦搜尋框
         */
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('searchKeyword').focus();
            
            // 檢查 URL 參數
            const params = new URLSearchParams(window.location.search);
            const keyword = params.get('q');
            if (keyword) {
                document.getElementById('searchKeyword').value = keyword;
                performSearch();
            }
        });
    </script>
</body>
</html>
