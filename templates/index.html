<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡牌價格監控系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #8b5cf6;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --border-color: #334155;
        }

        * {
            color-scheme: dark;
        }

        body {
            background-color: var(--dark-bg);
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar {
            background-color: var(--card-bg) !important;
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary-color) !important;
        }

        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .btn-primary:hover {
            background-color: var(--secondary-color);
            border-color: var(--secondary-color);
        }

        .container-fluid {
            padding: 2rem 1rem;
        }

        .header-section {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
        }

        .header-section h1 {
            color: var(--primary-color);
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-card h3 {
            color: var(--secondary-color);
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .stat-card p {
            color: #94a3b8;
            margin: 0;
        }

        .btn-update {
            margin-bottom: 2rem;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .card-item:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
            transform: translateY(-5px);
        }

        .card-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background-color: var(--border-color);
        }

        .card-content {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-name {
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            line-height: 1.3;
        }

        .card-price {
            font-size: 1.5rem;
            color: var(--success-color);
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .card-description {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            flex-grow: 1;
        }

        .btn-view-chart {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-size: 0.85rem;
            width: 100%;
        }

        .btn-view-chart:hover {
            background-color: var(--secondary-color);
            border-color: var(--secondary-color);
            color: white;
            text-decoration: none;
        }

        /* Modal */
        .modal-content {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
        }

        .modal-header {
            border-bottom: 1px solid var(--border-color);
        }

        .modal-title {
            color: var(--primary-color);
            font-weight: 700;
        }

        .btn-close {
            filter: invert(1);
        }

        .chart-container {
            position: relative;
            height: 400px;
            margin: 2rem 0;
        }

        /* Toast/Alert */
        .alert {
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
        }

        .alert-info {
            color: #06b6d4;
            border-color: #06b6d4;
        }

        .alert-success {
            color: var(--success-color);
            border-color: var(--success-color);
        }

        .alert-danger {
            color: var(--danger-color);
            border-color: var(--danger-color);
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(99, 102, 241, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary-color);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .no-cards {
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
        }

        .no-cards-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        footer {
            background-color: var(--card-bg);
            border-top: 1px solid var(--border-color);
            padding: 2rem;
            text-align: center;
            color: #64748b;
            margin-top: auto;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
    <!-- 導航欄 -->
    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid">
            <span class="navbar-brand">ðŸall 卡牌價格監控</span>
            <div>
                <button id="updateBtn" class="btn btn-primary btn-sm" onclick="triggerUpdate()">
                    <span class="loading-spinner" id="updateSpinner" style="display: none;"></span>
                    <span id="updateText">更新卡牌</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="container-fluid flex-grow-1">
        <!-- 消息提示 -->
        <div id="alertContainer" style="position: fixed; top: 80px; right: 20px; z-index: 9999; width: 100%; max-width: 400px;"></div>

        <!-- 統計信息 -->
        <div class="header-section">
            <h1>📊 卡牌市場監要</h1>
            <div class="stats-container">
                <div class="stat-card">
                    <h3 id="totalCards">0</h3>
                    <p>卡牌總數</p>
                </div>
                <div class="stat-card">
                    <h3 id="priceHistory">0</h3>
                    <p>價格記錄</p>
                </div>
                <div class="stat-card">
                    <h3 id="avgPrice">$0</h3>
                    <p>平均價格</p>
                </div>
            </div>
        </div>

        <!-- 卡牌網格 -->
        <div class="cards-grid" id="cardsContainer">
            <div class="no-cards">
                <div class="no-cards-icon">🔍</div>
                <h3>尚無卡牌數據</h3>
                <p>點擊「更新卡牌」按鈕來加載卡牌信息</p>
            </div>
        </div>
    </div>

    <!-- 價格圖表 Modal -->
    <div class="modal fade" id="priceChartModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">卡牌價格歷史</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="chart-container">
                        <canvas id="priceChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 頁腳 -->
    <footer>
        <p>&copy; 2024 卡牌價格監控系統 | 數據更新時間: <span id="lastUpdate">-</span></p>
    </footer>

    <!-- Bootstrap & 自定義腳本 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 全局變量
        let chartInstance = null;
        const alertContainer = document.getElementById('alertContainer');
        const cardsContainer = document.getElementById('cardsContainer');

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadCards();
            loadStats();
            updateLastUpdateTime();
        });

        /**
         * 顯示提示消息
         */
        function showAlert(message, type = 'info') {
            const alertId = `alert-${Date.now()}`;
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert" id="${alertId}">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            alertContainer.insertAdjacentHTML('beforeend', alertHtml);
            
            // 3 秒後自動關閉
            setTimeout(() => {
                const elem = document.getElementById(alertId);
                if (elem) elem.remove();
            }, 3000);
        }

        /**
         * 加載卡牌列表
         */
        async function loadCards() {
            try {
                const response = await fetch('/api/cards');
                const cards = await response.json();
                
                if (!cards || cards.length === 0) {
                    cardsContainer.innerHTML = `
                        <div class="no-cards" style="grid-column: 1/-1;">
                            <div class="no-cards-icon">🔍</div>
                            <h3>尚無卡牌數據</h3>
                            <p>點擊「更新卡牌」按鈕來加載卡牌信息</p>
                        </div>
                    `;
                    return;
                }
                
                cardsContainer.innerHTML = cards.map(card => `
                    <div class="card-item">
                        <img src="${card.image_url || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22280%22%3E%3Crect fill=%22%23334155%22 width=%22200%22 height=%22280%22/%3E%3C/svg%3E'}" 
                             alt="${card.name}" class="card-image">
                        <div class="card-content">
                            <h3 class="card-name">${card.name}</h3>
                            <div class="card-price">NT\$ ${card.current_price.toLocaleString('zh-TW', {minimumFractionDigits: 0})}</div>
                            <p class="card-description">${card.description || '暫無描述'}</p>
                            <button class="btn-view-chart" onclick="loadPriceHistory(${card.id}, '${card.name}')">
                                📈 查看價格圖表
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('加載卡牌失敗:', error);
                showAlert('加載卡牌失敗', 'danger');
            }
        }

        /**
         * 加載統計信息
         */
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const stats = await response.json();
                
                document.getElementById('totalCards').textContent = stats.total_cards;
                document.getElementById('priceHistory').textContent = stats.price_history_count;
                document.getElementById('avgPrice').textContent = `NT\$ ${stats.average_price.toLocaleString('zh-TW')}`;
            } catch (error) {
                console.error('加載統計信息失敗:', error);
            }
        }

        /**
         * 加載單張卡牌的價格歷史
         */
        async function loadPriceHistory(cardId, cardName) {
            try {
                const response = await fetch(`/api/cards/${cardId}/price-history`);
                const data = await response.json();
                
                document.getElementById('modalTitle').textContent = `${cardName} - 價格歷史`;
                
                // 準備圖表數據
                const dates = data.history.map(h => h.date);
                const prices = data.history.map(h => h.price);
                
                // 銷毀舊圖表
                if (chartInstance) {
                    chartInstance.destroy();
                }
                
                // 創建新圖表
                const ctx = document.getElementById('priceChart').getContext('2d');
                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: dates,
                        datasets: [{
                            label: '價格 (NT$)',
                            data: prices,
                            borderColor: '#6366f1',
                            backgroundColor: 'rgba(99, 102, 241, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            fill: true,
                            pointBackgroundColor: '#8b5cf6',
                            pointBorderColor: '#6366f1',
                            pointRadius: 5,
                            pointHoverRadius: 7
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                labels: {
                                    color: '#e2e8f0',
                                    font: {
                                        size: 14,
                                        weight: '600'
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                ticks: {
                                    color: '#94a3b8',
                                    callback: function(value) {
                                        return 'NT\$ ' + value.toLocaleString('zh-TW');
                                    }
                                },
                                grid: {
                                    color: '#334155'
                                }
                            },
                            x: {
                                ticks: {
                                    color: '#94a3b8'
                                },
                                grid: {
                                    color: '#334155'
                                }
                            }
                        }
                    }
                });
                
                // 顯示 Modal
                const modal = new bootstrap.Modal(document.getElementById('priceChartModal'));
                modal.show();
            } catch (error) {
                console.error('加載價格歷史失敗:', error);
                showAlert('加載價格歷史失敗', 'danger');
            }
        }

        /**
         * 觸發爬蟲更新
         */
        async function triggerUpdate() {
            const updateBtn = document.getElementById('updateBtn');
            const updateSpinner = document.getElementById('updateSpinner');
            const updateText = document.getElementById('updateText');
            
            updateBtn.disabled = true;
            updateSpinner.style.display = 'inline-block';
            updateText.textContent = '更新中...';
            
            try {
                const response = await fetch('/update', { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    showAlert(`✅ ${data.message}`, 'success');
                    loadCards();
                    loadStats();
                    updateLastUpdateTime();
                } else {
                    showAlert(`❌ 更新失敗: ${data.error}`, 'danger');
                }
            } catch (error) {
                console.error('更新卡牌失敗:', error);
                showAlert('更新卡牌失敗，請檢查服務器', 'danger');
            } finally {
                updateBtn.disabled = false;
                updateSpinner.style.display = 'none';
                updateText.textContent = '更新卡牌';
            }
        }

        /**
         * 更新最後更新時間
         */
        function updateLastUpdateTime() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent = now.toLocaleString('zh-TW');
        }
    </script>
</body>
</html>
